<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>前端数据管理面板</title>
    <link rel="stylesheet" href="/css/day08-Javascript进阶文件夹/dashBoard.css">
</head>

<body>
    <div class="container">
        <h2>数据管理面板</h2>
        <!-- 搜索模块 -->
        <div class="search-box">
            <input type="text" id="search" placeholder="搜索数据">
        </div>
        <!-- 数据列表 -->
        <div class="list" id="list">滚动加载数据</div>
        <!-- 表单模块 -->
        <div class="form">
            <button class="btn" id="editBtn">编辑数据</button>
        </div>
    </div>
    <script src="/js/day08-JavaScript进阶文件夹/utils.js"></script>
</body>

</html>
